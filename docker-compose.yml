version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8888:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:password@db:5432/ims}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-incident-management-project}
      - GCP_BUCKET_NAME=${GCP_BUCKET_NAME:-incident-management-storage}
    volumes:
      - ./backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8090:80"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ims
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
