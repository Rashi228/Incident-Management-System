<div class="page animate-fade-in">
  <div class="page-header">
    <div>
      <h1>Publish Knowledge Article</h1>
      <p>Share your knowledge to help users resolve issues faster</p>
    </div>
  </div>

  <div class="form-card card">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label class="form-label">Article Title *</label>
        <input type="text" class="form-control" [class.error]="getError('title')" formControlName="title" placeholder="e.g. How to reset your VPN password">
        <span class="field-error" *ngIf="getError('title')">{{ getError('title') }}</span>
      </div>

      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-control" [class.error]="getError('category')" formControlName="category">
          <option value="">Select a category</option>
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
        <span class="field-error" *ngIf="getError('category')">{{ getError('category') }}</span>
      </div>

      <div class="form-group">
        <label class="form-label">Article Content * <span style="color: var(--text-muted); font-weight: 400;">(min 50 characters)</span></label>
        <textarea class="form-control article-textarea" [class.error]="getError('content')" formControlName="content" rows="12"
          placeholder="Write a clear, step-by-step explanation. Include any troubleshooting steps, links, or commands that would help a user resolve the issue on their own."></textarea>
        <span class="field-error" *ngIf="getError('content')">{{ getError('content') }}</span>
        <span class="char-count">{{ form.get('content')?.value?.length || 0 }} characters</span>
      </div>

      <div class="form-actions">
        <a routerLink="/service-desk/knowledge" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-primary" [disabled]="isSubmitting">
          <span class="spinner" *ngIf="isSubmitting"></span>
          {{ isSubmitting ? 'Publishing...' : '📤 Publish Article' }}
        </button>
      </div>

    </form>
  </div>
</div>
