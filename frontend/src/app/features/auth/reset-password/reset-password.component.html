<div class="auth-layout animate-fade-in">
  <div class="auth-banner">
    <div class="banner-content">
      <div class="brand">
        <div class="logo-box">TCS</div>
        <div class="brand-text">
          <h1>Enterprise Incident Management</h1>
          <p>Powered by Tata Consultancy Services</p>
        </div>
      </div>
      <div class="workflow-section">
        <h3>Reset Password</h3>
        <p style="color: #bae6fd; line-height: 1.5;">
          You're almost there! Please choose a strong, secure password for your account.
        </p>
      </div>
    </div>
  </div>

  <div class="auth-form-container">
    <div class="auth-card">
      <div class="card-header">
        <h2>Set New Password</h2>
        <p>Enter your new secure password below</p>
      </div>
      
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label class="form-label">New Password *</label>
          <input type="password" class="form-control" formControlName="new_password" placeholder="Min 8 characters">
          <span class="field-error" *ngIf="form.get('new_password')?.invalid && form.get('new_password')?.touched">
            Password must be at least 8 characters
          </span>
        </div>

        <button type="submit" class="btn-primary w-100" [disabled]="isSubmitting">
          <span class="spinner" *ngIf="isSubmitting"></span>
          <span>{{ isSubmitting ? 'Saving...' : 'Update Password' }}</span>
        </button>
      </form>
    </div>
  </div>
</div>
