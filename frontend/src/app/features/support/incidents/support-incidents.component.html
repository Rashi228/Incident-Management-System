<div class="page animate-fade-in">
  <div class="page-header">
    <div>
      <h1>My Queue</h1>
      <p>Incidents currently assigned to you</p>
    </div>
  </div>
  <div class="skeleton-table card" *ngIf="loading">
    <div class="skeleton-row" *ngFor="let i of [1,2,3,4]"></div>
  </div>
  <div class="table-container card" *ngIf="!loading">
    <table class="data-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Priority</th>
          <th>Created</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let incident of incidents">
          <td class="title-cell">{{ incident.title }}</td>
          <td><app-status-badge [status]="incident.status" [label]="incident.status"></app-status-badge></td>
          <td><app-status-badge [status]="incident.priority" [label]="incident.priority"></app-status-badge></td>
          <td class="date-cell">{{ incident.created_at | date:'MMM d' }}</td>
          <td>
            <button class="action-btn" (click)="openModal(incident)">Update Status</button>
          </td>
        </tr>
        <tr *ngIf="incidents.length === 0">
          <td colspan="5" class="empty-row">
            <div class="empty-state-box">
              <p>Your queue is empty.</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<div class="modal-overlay" *ngIf="showNoteModal" (click)="closeModal()">
  <div class="modal card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Update Status</h3>
      <button class="close-btn" (click)="closeModal()">✕</button>
    </div>
    <div class="modal-body" *ngIf="selectedIncident">
      <p class="incident-title">{{ selectedIncident.title }}</p>
      <form [formGroup]="updateForm">
        <div class="form-group">
          <label class="form-label">New Status</label>
          <select class="form-control" formControlName="status">
            <option *ngFor="let s of statuses" [value]="s">{{ s.replace('_', ' ') | titlecase }}</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
      <button class="btn-primary" (click)="updateStatus()">Save Changes</button>
    </div>
  </div>
</div>
