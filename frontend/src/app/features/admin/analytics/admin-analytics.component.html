<div class="page animate-fade-in">
  <div class="page-header">
    <div>
      <h1>Analytics</h1>
      <p>System-wide performance and distribution</p>
    </div>
  </div>

  <div class="skeleton-grid" *ngIf="loading">
    <div class="skeleton-card" *ngFor="let i of [1,2]"></div>
  </div>

  <div class="content-grid" *ngIf="!loading && stats">
    <!-- Status Chart -->
    <div class="panel card">
      <div class="panel-header">
        <h3>Incidents by Status</h3>
      </div>
      <div class="chart-container" style="position: relative; height:300px; width:100%">
        <canvas #statusChart></canvas>
      </div>
    </div>

    <!-- Priority Chart -->
    <div class="panel card">
      <div class="panel-header">
        <h3>Incidents by Priority</h3>
      </div>
      <div class="chart-container" style="position: relative; height:300px; width:100%">
        <canvas #priorityChart></canvas>
      </div>
    </div>
  </div>

  <div class="empty-state" *ngIf="!loading && !stats">
    <p>No analytical data available.</p>
  </div>
</div>
